<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#130D22">
<title>Sabrina Pils-Matiasek · Co-Systems</title>

<!-- Open Graph for link previews -->
<meta property="og:title" content="Sabrina Pils-Matiasek · Co-Systems">
<meta property="og:description" content="Founder & Revenue Systems Partner für B2B-Unternehmen im Mensch-AI-Zeitalter.">
<meta property="og:image" content="Sabrina.jpg">

<link href="https://fonts.googleapis.com/css2?family=Allison&family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --purple:  #bb32fe;
  --orange:  #ffba32;
  --dark:    #130D22;
  --card-bg: #FAFAF8;
}

html, body {
  min-height: 100%;
  background: var(--dark);
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 14px 60px;
  gap: 0;
}

/* ─── Logo header ─── */
.site-header {
  width: 100%;
  max-width: 620px;
  display: flex;
  justify-content: center;
  margin-bottom: 28px;
}

.logo-svg {
  height: 42px;   /* 32px × 1.3 */
  width: auto;
}

/* ─── Card – landscape, business-card ratio 85:55 ─── */
.card {
  width: 100%;
  max-width: 620px;
  aspect-ratio: 85 / 55;
  border-radius: 18px;
  overflow: hidden;
  padding-bottom: 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
  background:
    radial-gradient(ellipse at 82% 15%,  rgba(187, 50, 254, 0.22) 0%, transparent 52%),
    radial-gradient(ellipse at 12% 82%,  rgba(255, 186, 50, 0.18) 0%, transparent 48%),
    radial-gradient(ellipse at 55% 48%,  rgba(230, 80, 180, 0.13) 0%, transparent 55%),
    radial-gradient(ellipse at 90% 75%,  rgba(255, 140, 60, 0.12) 0%, transparent 40%),
    linear-gradient(145deg, #FFF9F2 0%, #FDF4FF 45%, #FFF6ED 100%);
  display: flex;
  flex-direction: column;
}

/* — Card top — */
.card-top {
  flex: 1;
  padding: 18px 22px 14px;
  display: flex;
  flex-direction: column;
}

.name-row {
  display: flex;
  align-items: center;
  gap: 20px;
}

.photo-ring {
  width:  clamp(96px, 23vw, 148px);
  height: clamp(96px, 23vw, 148px);
  border-radius: 50%;
  flex-shrink: 0;
  padding: 2px;
  background: linear-gradient(135deg, var(--purple), var(--orange));
  box-shadow: 0 4px 16px rgba(187, 50, 254, 0.25);
}

.photo-ring img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  object-position: center top;
  display: block;
}

.name-block {}

.person-name {
  font-family: 'Allison', cursive;
  font-size: clamp(38px, 8.3vw, 58px);
  font-weight: 400;
  color: #1A1030;
  line-height: 1.0;
  margin-bottom: 6px;
  white-space: nowrap;
}

.person-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(9.8px, 2.4vw, 15px);
  font-weight: 500;
  color: #3A2850;
  letter-spacing: 0.2px;
  line-height: 1.4;
}

/* — Tagline band — */
.tagline-band {
  margin-top: auto;
  margin-bottom: auto;
  padding: 8px 16px;
  background: linear-gradient(90deg, rgba(187,50,254,0.08), rgba(255,186,50,0.10));
  border-radius: 8px;
  border: 1px solid rgba(187,50,254,0.15);
}

.tagline-text {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: clamp(12px, 3vw, 19px);
  font-weight: 800;
  line-height: 1.5;
  background: linear-gradient(90deg, var(--purple) 0%, #e0607c 50%, var(--orange) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
}

/* — Card bottom: contacts — */
.card-bottom {
  padding: 10px 14px 14px;
  border-top: 1px solid rgba(0,0,0,0.06);
  display: grid;
  grid-template-columns: 2fr 1.3fr 0.9fr;
  gap: 4px;
}

.contact-col {}

.contact-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(9px, 2.2vw, 14px);
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #bb32fe;
  margin-bottom: 4px;
}

.contact-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(12px, 2.6vw, 15.5px);
  font-weight: 400;
  color: #2A1840;
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.contact-value a {
  color: inherit;
  text-decoration: none;
}

/* ─── CTA Button ─── */
.cta-section {
  width: 100%;
  max-width: 320px;   /* narrower than card */
  margin-top: 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}

.btn-save {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 18px 24px;
  border-radius: 14px;
  background: linear-gradient(90deg, var(--purple) 0%, #d540f0 50%, var(--orange) 100%);
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-decoration: none;
  cursor: pointer;
  border: none;
  box-shadow: 0 4px 24px rgba(187, 50, 254, 0.35);
  transition: opacity 0.15s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.btn-save:active {
  opacity: 0.9;
  transform: scale(0.985);
}

.btn-save svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: white;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

/* Secondary links */
.quick-links {
  display: flex;
  gap: 16px;
  align-items: center;
}

.quick-link {
  font-size: 13px;
  font-weight: 500;
  color: #ffffff;
  text-decoration: none;
  letter-spacing: 0.3px;
  transition: opacity 0.15s;
}

.quick-link:hover { opacity: 0.75; }

.quick-link-sep {
  color: rgba(255,255,255,0.3);
  font-size: 10px;
}
</style>
</head>
<body>

        <img src="Sabrina.jpg" alt="Sabrina Pils-Matiasek">
      </div>
      <div class="name-block">

    <div class="tagline-band">

  <div class="card-bottom">

</div>

  <div class="quick-links">

</body>
</html>
